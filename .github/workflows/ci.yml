name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build (Next standalone)
        run: npm run build
        env:
          # Build must not require a DB or secrets; NEXT_PUBLIC_* is inlined here.
          NEXT_PUBLIC_SITE_URL: https://engscroll.com
          NEXT_TELEMETRY_DISABLED: "1"
